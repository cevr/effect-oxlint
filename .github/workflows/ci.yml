name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  check-plugin:
    name: Check JS Plugin
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - run: bun install

      - name: Typecheck
        run: cd packages/oxlint-plugin-effect && bun run typecheck

      - name: Lint
        run: cd packages/oxlint-plugin-effect && bun run lint:ox

      - name: Test
        run: cd packages/oxlint-plugin-effect && bun test

  build-tsgolint:
    name: Build tsgolint-effect (${{ matrix.os }})
    runs-on: ${{ matrix.runner }}
    strategy:
      matrix:
        include:
          - os: darwin-arm64
            runner: macos-latest
            goos: darwin
            goarch: arm64
          - os: darwin-x64
            runner: macos-latest
            goos: darwin
            goarch: amd64
          - os: linux-arm64
            runner: ubuntu-24.04-arm
            goos: linux
            goarch: arm64
          - os: linux-x64
            runner: ubuntu-latest
            goos: linux
            goarch: amd64
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version: "1.26"

      - name: Init tsgolint
        working-directory: packages/tsgolint-effect
        run: |
          git init typescript-go
          cd typescript-go
          git remote add origin https://github.com/microsoft/typescript-go.git
          git fetch --depth 1 origin caf3ecdeceba81ab6bcd7419c99dab5f5dd66306
          git checkout FETCH_HEAD
          for patch in ../patches/*.patch; do git apply "$patch"; done

      - name: Build
        working-directory: packages/tsgolint-effect
        run: |
          GOOS=${{ matrix.goos }} GOARCH=${{ matrix.goarch }} CGO_ENABLED=0 \
            go build -o npm/${{ matrix.os }}/tsgolint ./cmd/tsgolint

      - name: Upload binary
        uses: actions/upload-artifact@v4
        with:
          name: tsgolint-${{ matrix.os }}
          path: packages/tsgolint-effect/npm/${{ matrix.os }}/tsgolint
